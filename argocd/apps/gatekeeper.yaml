# ArgoCD App: Install OPA Gatekeeper admission controller
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    chart: gatekeeper
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    targetRevision: 3.17.1
    helm:
      parameters:
        - name: controllerManager.livenessProbe.timeoutSeconds
          value: "5"
        - name: controllerManager.readinessProbe.timeoutSeconds
          value: "5"
        - name: audit.livenessProbe.timeoutSeconds
          value: "5"
        - name: audit.readinessProbe.timeoutSeconds
          value: "5"
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

