apiVersion: v1
kind: Pod
metadata:
  name: pod-unsigned
  namespace: demo
spec:
  containers:
  - name: nginx
    # Image từ Docker Hub — không thuộc glob ghcr.io/bearh141/*
    # ClusterImagePolicy sẽ reject với lỗi rõ ràng "no matching policies"
    # hoặc "image not allowed" từ policy.sigstore.dev webhook
    image: docker.io/library/nginx:1.25.1
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
    securityContext:
      runAsUser: 1000
      runAsNonRoot: true
