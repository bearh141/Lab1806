apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deploy-with-owner
  namespace: demo
  labels:
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-with-owner
  template:
    metadata:
      labels:
        app: test-with-owner
    spec:
      containers:
      - name: nginx
        image: nginx:1.25.1
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
