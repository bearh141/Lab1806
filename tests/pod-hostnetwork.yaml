apiVersion: v1
kind: Pod
metadata:
  name: test-pod-hostnetwork
  namespace: demo
spec:
  hostNetwork: true
  containers:
  - name: nginx
    image: nginx:1.25.1
    resources:
      limits:
        cpu: 100m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
